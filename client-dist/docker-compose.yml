services:
  tika:
    image: apache/tika:3.0.0.0
    hostname: tika
    extra_hosts:
      - "tika:127.0.0.1"
    environment:
      - JAVA_OPTS=-Djava.net.preferIPv4Stack=true
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_FLASH_ATTENTION=false
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 && bash -c '</dev/tcp/127.0.0.1/11434' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull bge-m3"]
    restart: "no"

  scanner:
    image: ghcr.io/REPLACE_WITH_YOUR_ORG/huginn:latest
    depends_on:
      tika:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "${HUGINN_PORT:-3000}:3000"
    volumes:
      - ${DOCUMENTS_PATH}:/documents:ro
      - huginn_reports:/reports
    environment:
      - TIKA_URL=http://tika:9998
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=bge-m3
      - DOCUMENTS_ROOT=/documents
      - REPORT_OUTPUT=/reports
      - HUGINN_SERVER_PORT=3000
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
  huginn_reports:
