services:
  tika:
    # Pinned to a specific Tika 3.x release. The :latest tag started returning
    # builds that fail with "Could not determine local host name" because the
    # JVM cannot resolve the container's own hostname during startup. We pin to
    # a known-good release and add extra_hosts so the hostname always resolves.
    image: apache/tika:3.0.0.0
    hostname: tika
    extra_hosts:
      - "tika:127.0.0.1"
    environment:
      # Force IPv4 in the JVM. Several apache/tika builds fail localhost
      # resolution via IPv6 inside Docker, which surfaces as the same error.
      - JAVA_OPTS=-Djava.net.preferIPv4Stack=true
    ports:
      - "9998:9998"
    restart: unless-stopped
    # No Docker healthcheck — the JRE base image has no curl/wget.
    # The scanner performs its own Tika health check at startup and
    # skips PDF parsing gracefully if Tika is unreachable.

  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    environment:
      # Explicitly bind to all interfaces so other containers can reach :11434.
      # Some recent ollama/ollama:latest builds defaulted to 127.0.0.1.
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      # Use the HTTP endpoint directly (ollama's binary ships with bash). This
      # verifies the externally-reachable surface, not just the in-process state,
      # which closes the race where 'ollama list' passes before :11434 is bound.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 && bash -c '</dev/tcp/127.0.0.1/11434' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Chat models are no longer pre-pulled — the in-UI setup wizard handles
  # model selection and download on first visit (see src/server/setup-state.ts).
  # The embedding model is auto-pulled by Ollama on first embed request.

  scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    depends_on:
      tika:
        condition: service_started
      ollama:
        condition: service_healthy
    ports:
      - "${HUGINN_PORT:-3000}:3000"
    volumes:
      - ${DOCUMENTS_PATH:-./documents}:/documents:ro
    environment:
      - TIKA_URL=http://tika:9998
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - DOCUMENTS_ROOT=/documents
      - REPORT_OUTPUT=/reports
      - LLM_SAMPLE_RATE=0.10
      - HUGINN_SERVER_PORT=3000
    restart: unless-stopped
    command: bun run src/index.ts

volumes:
  ollama_data:
