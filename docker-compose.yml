services:
  ollama:
    image: ollama/ollama:latest
    hostname: ollama
    environment:
      # Explicitly bind to all interfaces so other containers can reach :11434.
      # Some recent ollama/ollama:latest builds defaulted to 127.0.0.1.
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_FLASH_ATTENTION=false
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      # Use the HTTP endpoint directly (ollama's binary ships with bash). This
      # verifies the externally-reachable surface, not just the in-process state,
      # which closes the race where 'ollama list' passes before :11434 is bound.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 && bash -c '</dev/tcp/127.0.0.1/11434' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Chat models are no longer pre-pulled — the in-UI setup wizard handles
  # model selection and download on first visit (see src/server/setup-state.ts).
  # The embedding model (bge-m3) is pulled once by ollama-init before the scanner starts.

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull bge-m3"]
    restart: "no"

  scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "${HUGINN_PORT:-3000}:3000"
    volumes:
      - ${DOCUMENTS_PATH:-./documents}:/documents:ro
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=bge-m3
      - DOCUMENTS_ROOT=/documents
      - REPORT_OUTPUT=/reports
      - HUGINN_SERVER_PORT=3000
    restart: unless-stopped
    command: bun run src/index.ts

volumes:
  ollama_data:
